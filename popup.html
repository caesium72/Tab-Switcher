<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #667eea;
    }
    p {
      margin: 0 0 15px 0;
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      text-align: center;
    }
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
    }
    .shortcuts-list {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 12px;
      margin: 15px 0;
      font-size: 13px;
    }
    .shortcut-item {
      margin: 8px 0;
      padding: 6px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .shortcut-item:last-child {
      border-bottom: none;
    }
    .shortcut-label {
      font-weight: 500;
      color: #333;
    }
    .shortcut-key {
      color: #667eea;
      font-family: 'Monaco', 'Menlo', monospace;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Keyboard Tab Switcher</h1>
    <p>Configure your keyboard shortcuts to switch between tabs quickly and efficiently.</p>
    
    <div class="shortcuts-list">
      <div class="shortcut-item">
        <div class="shortcut-label">Next Tab</div>
        <div class="shortcut-key">Ctrl+Shift+Right</div>
      </div>
      <div class="shortcut-item">
        <div class="shortcut-label">Previous Tab</div>
        <div class="shortcut-key">Ctrl+Shift+Left</div>
      </div>
    </div>

    <p style="font-size: 12px; color: #999; margin-bottom: 15px;">Click the button below to customize these shortcuts:</p>
    
    <button class="button" id="openShortcuts">Configure Shortcuts</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
